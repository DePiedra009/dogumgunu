<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun!</title>
    <style>
        body { 
            background: #ff4757; /* Arka planı kırmızı yaptık ki siyah kalmasın! */
            color: white; 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .card { background: white; color: #333; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 80%; max-width: 400px; }
        img { width: 100%; border-radius: 10px; margin-bottom: 15px; background: #eee; }
        h1 { color: #ff4757; margin: 10px 0; font-size: 1.5rem; }
        .btn { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #msg { display: none; margin-top: 20px; font-weight: bold; color: #ff4757; }
    </style>
</head>
<body>
    <div class="card">
        <img src="resim.jpg" alt="❤️❤️❤️">
        <h1>İyi ki Doğdun Sevgilim!</h1>
        <p>Seninle her şey çok daha güzel.</p>
        <button class="btn" onclick="document.getElementById('msg').style.display='block'; this.style.display='none';">Tıkla Bakalım ❤️❤️❤️</button>
        <div id="msg">SENİ ÇOK SEVİYORUM!</div>
