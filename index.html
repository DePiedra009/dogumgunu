<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Sevgilim!</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .card { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 10px 50px rgba(255, 71, 87, 0.3); 
            border: 1px solid #333;
            width: 85%;
            max-width: 400px;
        }
        .heart-icon { font-size: 70px; margin-bottom: 20px; animation: beat 0.8s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
        
        h1 { color: #ff4757; font-size: 1.8rem; margin-bottom: 15px; }
        p { color: #ccc; font-size: 1.1rem; line-height: 1.5; }
        
        .btn { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        
        #final-msg { display: none; margin-top: 25px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart-icon">❤️</div>
        <h1>İyi ki Doğdun!</h1>
        <p>Seninle geçen her saniye, hayatımın en güzel hediyesi.</p>
        
        <button class="btn" onclick="showSurprise()">Tıkla Bakalım ❤️</button>
        
        <div id="final-msg">
            <h2 style="color: #ff4757;">Seni Çok Seviyorum!</h2>
            <p>Nice mutlu, huzurlu ve beraber yıllarımıza fıstığım... İyi ki hayatımdasın!</p>
            <div style="font-size: 40px;">🎂✨🎁</div>
        </div>
    </div>

    <script>
        function showSurprise() {
            document.getElementById('final-msg').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
        }
    </script>
</body>
</html>
